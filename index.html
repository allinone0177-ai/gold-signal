<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XAU/USD AI Alpha Trader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0a0a0a; color: #e5e5e5; font-family: sans-serif; }
        .gold-text { color: #D4AF37; }
        .gold-bg { background-color: #D4AF37; }
        .card { background: #151515; border: 1px solid #222; border-radius: 12px; }
        .loader { border: 3px solid #333; border-top: 3px solid #D4AF37; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-4">
    <header class="max-w-4xl mx-auto mb-6 flex justify-between items-center">
        <h1 class="text-2xl font-bold gold-text">GOLD AI PRO</h1>
        <div class="card p-2 flex gap-2">
            <input type="password" id="apiKey" value="AIzaSyAMGWcgCyPxG4tAjTN0k3Y-xUhZZU9aq38" class="bg-transparent text-xs outline-none w-32" readonly>
            <span id="apiStatus" class="text-[10px] text-green-500 font-bold px-2">Connected</span>
        </div>
    </header>

    <main class="max-w-4xl mx-auto space-y-4">
        <div class="card h-[350px] overflow-hidden">
            <div id="tradingview_widget" style="height: 100%;"></div>
        </div>

        <div class="card p-6 relative">
            <div id="signalContent" class="text-center py-4 text-gray-500 font-bold">Ready to Analyze Market</div>
            <div id="loadingOverlay" class="hidden absolute inset-0 bg-black/90 flex flex-col items-center justify-center rounded-xl z-10">
                <div class="loader mb-2"></div>
                <p class="text-xs gold-text font-bold uppercase">AI IS ANALYZING XAU/USD...</p>
            </div>
            <button onclick="fetchSignal()" class="w-full mt-4 border border-gold-border text-gold-text py-4 rounded-lg font-bold hover:bg-gold-text hover:text-black transition-all uppercase tracking-wider">SCAN NOW</button>
        </div>
    </main>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        window.onload = () => {
            new TradingView.widget({ "width": "100%", "height": "100%", "symbol": "OANDA:XAUUSD", "interval": "60", "theme": "dark", "style": "1", "container_id": "tradingview_widget", "locale": "en" });
        };

        async function fetchSignal() {
            const k = document.getElementById('apiKey').value;
            document.getElementById('loadingOverlay').classList.remove('hidden');
            
            const prompt = "Analyze XAU/USD Gold current price action. Provide a professional trading signal in JSON format: {'action': 'BUY/SELL/WAIT', 'entry': 0.0, 'sl': 0.0, 'tp': 0.0, 'confidence': '0%', 'reason': 'one short sentence'}. Return ONLY raw JSON.";

            try {
                // Using Gemini 1.5 Flash as it is more stable and faster
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${k}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });

                const data = await res.json();
                const text = data.candidates[0].content.parts[0].text;
                const match = text.match(/\{[\s\S]*\}/);
                
                if (match) {
                    const s = JSON.parse(match[0]);
                    document.getElementById('signalContent').innerHTML = `
                        <div class="flex justify-between items-center mb-6">
                            <span class="px-6 py-2 rounded-lg font-black text-sm ${s.action === 'BUY' ? 'bg-green-600 text-white' : (s.action === 'SELL' ? 'bg-red-600 text-white' : 'bg-gray-700 text-gray-300')}">${s.action}</span>
                            <span class="gold-text font-bold text-lg underline">CONFIDENCE: ${s.confidence}</span>
                        </div>
                        <div class="grid grid-cols-3 gap-4 text-sm font-mono">
                            <div class="bg-black/50 p-3 rounded-lg border border-gray-800"><p class="text-[10px] text-gray-500 uppercase">Entry</p><p class="font-bold text-white">${s.entry}</p></div>
                            <div class="bg-black/50 p-3 rounded-lg border border-gray-800"><p class="text-[10px] text-gray-500 uppercase">SL</p><p class="font-bold text-red-500">${s.sl}</p></div>
                            <div class="bg-black/50 p-3 rounded-lg border border-gray-800"><p class="text-[10px] text-gray-500 uppercase">TP</p><p class="font-bold text-green-500">${s.tp}</p></div>
                        </div>
                        <div class="mt-6 p-3 bg-white/5 rounded-lg border-l-4 border-gold-border">
                             <p class="text-[11px] text-gray-400 italic text-left leading-relaxed">AI Analysis: ${s.reason}</p>
                        </div>
                    `;
                }
            } catch (e) {
                document.getElementById('signalContent').innerHTML = "<div class='py-4'><p class='text-red-500 text-xs font-bold'>Error: Signal Fetching Failed</p><p class='text-[10px] text-gray-600 mt-1'>Please try again in 1 minute.</p></div>";
            } finally {
                document.getElementById('loadingOverlay').classList.add('hidden');
            }
        }
    </script>
</body>
</html>
